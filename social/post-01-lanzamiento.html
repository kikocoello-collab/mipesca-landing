<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>MiPesca — Post 01 · Lanzamiento</title>
<style>
  /* Paleta MiPesca · mar abierto (idéntica a la app y la landing) */
  :root {
    --azul:       #0899c9;
    --azul-osc:   #05263c;
    --azul-cla:   #74dcf5;
    --abismo-2:   #0a3a57;
    --superficie: #0b2e46;
    --coral:      #ff7a5c;
    --verde-cla:  #74c69d;
    --amarillo:   #ffd166;
    --fosa:       #04121f;
    --fuente:     'Segoe UI', system-ui, sans-serif;
    --grad-oceano: linear-gradient(135deg, #00b4d8, #0077b6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1350px; overflow: hidden;
    font-family: var(--fuente); color: #fff;
    background: radial-gradient(130% 90% at 50% -8%, var(--abismo-2) 0%, var(--azul-osc) 55%, #031321 100%);
    -webkit-font-smoothing: antialiased;
  }

  .lienzo {
    position: relative; width: 1080px; height: 1350px;
    display: flex; flex-direction: column; align-items: center;
    padding: 64px 72px 56px;
  }

  /* Olas decorativas de fondo, muy sutiles */
  .olas-fondo { position: absolute; inset: auto 0 0 0; opacity: .5; pointer-events: none; }

  /* Cabecera de marca */
  .marca { display: flex; align-items: center; gap: 16px; align-self: flex-start; }
  .marca img { width: 56px; height: 56px; border-radius: 13px; display: block; }
  .marca span { font-size: 34px; font-weight: 800; letter-spacing: -.5px; }
  .marca .mi { color: var(--azul-cla); }

  /* Titular */
  .titular {
    margin-top: 44px; text-align: center;
    font-size: 58px; font-weight: 800; line-height: 1.14; letter-spacing: -1px;
    max-width: 880px;
  }
  .titular em { font-style: normal; color: var(--azul-cla); }

  .sub {
    margin-top: 22px; text-align: center; font-size: 27px; line-height: 1.5;
    color: rgba(255,255,255,.78); max-width: 720px; font-weight: 400;
  }

  /* Teléfono con captura real */
  .phone {
    margin-top: 40px;
    width: 336px;
    background: var(--fosa); border-radius: 40px; padding: 11px;
    border: 1px solid rgba(116,220,245,.22);
    box-shadow: 0 30px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.02);
  }
  .phone img { display: block; width: 100%; height: auto; border-radius: 29px; }

  /* Pastillas de funciones */
  .pastillas {
    margin-top: 36px; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
  }
  .pastilla {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,.07); border: 1px solid rgba(116,220,245,.16);
    border-radius: 40px; padding: 14px 26px; font-size: 21px; font-weight: 600;
  }
  .pastilla svg { width: 24px; height: 24px; color: var(--azul-cla); flex: none; }

  /* CTA final */
  .cta {
    margin-top: auto; width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(8,153,201,.14); border: 1px solid rgba(116,220,245,.22);
    border-radius: 26px; padding: 26px 34px;
  }
  .cta-texto b { display: block; font-size: 27px; font-weight: 800; }
  .cta-texto span { display: block; margin-top: 4px; font-size: 20px; color: rgba(255,255,255,.7); }
  .cta-badge {
    background: var(--grad-oceano); color: #fff; font-weight: 800; font-size: 21px;
    padding: 16px 30px; border-radius: 40px; white-space: nowrap;
    box-shadow: 0 6px 18px rgba(0,150,199,.4);
  }

</style>
</head>
<body>
  <div class="lienzo">
    <svg class="olas-fondo" viewBox="0 0 1080 140" preserveAspectRatio="none" width="1080" height="140">
      <path d="M0 90c60 0 60-24 120-24s60 24 120 24 60-24 120-24 60 24 120 24 60-24 120-24 60 24 120 24 60-24 120-24 60 24 120 24 60-24 120-24v70H0z"
        fill="#74dcf5" opacity=".08"/>
    </svg>

    <div class="marca">
      <img src="../img/logo.svg" alt="" />
      <span><span class="mi">Mi</span>Pesca</span>
    </div>

    <h1 class="titular">¿Merece la pena <em>coger la caña</em> hoy?</h1>
    <p class="sub">MiPesca cruza solunar, viento, mareas y presión en una puntuación de 0 a 100 — para tu spot exacto.</p>

    <div class="phone">
      <img src="../img/app-pescar.png" alt="" />
    </div>

    <div class="pastillas">
      <span class="pastilla">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="7" width="18" height="13" rx="2"/>
          <path d="M8 7l1.4-2.4a1 1 0 0 1 .9-.6h3.4a1 1 0 0 1 .9.6L16 7"/>
          <circle cx="12" cy="13.5" r="3.2"/>
        </svg>
        Cámaras en directo
      </span>
      <span class="pastilla">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4v16a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V8l-4-4H5a1 1 0 0 0-1 1z"/>
          <path d="M15 4v4h4"/><path d="M8 12h8M8 16h5"/>
        </svg>
        Diario de capturas
      </span>
      <span class="pastilla">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 6c2 0 2 1.5 4 1.5S8 6 10 6s2 1.5 4 1.5S16 6 18 6s2 1.5 4 1.5"/>
          <path d="M2 12c2 0 2 1.5 4 1.5s2-1.5 4-1.5 2 1.5 4 1.5 2-1.5 4-1.5 2 1.5 4 1.5"/>
          <path d="M2 18c2 0 2 1.5 4 1.5s2-1.5 4-1.5 2 1.5 4 1.5 2-1.5 4-1.5 2 1.5 4 1.5"/>
        </svg>
        Comunidad
      </span>
    </div>

    <div class="cta">
      <div class="cta-texto">
        <b>MiPesca ya está aquí</b>
        <span>Gratis · sin instalar nada</span>
      </div>
      <div class="cta-badge">Link en la bio ↗</div>
    </div>
  </div>
</body>
</html>
